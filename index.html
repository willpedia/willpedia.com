<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>WILLPEDIA</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/joki.css">
  <link rel="icon" type="image/png" href="assets/logo-willpedia.png">
</head>
<body>
  
<header class="navbar">

  <a href="joki.html" class="nav-brand">
    <img src="assets/logo-willpedia.png" alt="WILLPEDIA">
    <span>WILLPEDIA</span>
  </a>


<div class="nav-right">

    <div class="nav-search">
      <input type="text" id="topupSearch" placeholder="Cari topup...">
      <span class="search-icon"></span>
    </div>

    <button id="menuBtn" class="menu-btn" aria-label="Menu" type="button">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- SEARCH OVERLAY (di luar header) -->
<div id="searchOverlay" class="search-results-overlay">
  <div id="searchResults" class="search-results-list"></div>
</div>

<!-- OVERLAY (WAJIB untuk drawer) -->
<div id="overlay" class="overlay"></div>

<!-- DRAWER -->
<aside id="drawer" class="drawer">
  <div class="drawer-header">
    <span class="drawer-title">MENU</span>
    <button class="close-btn" id="closeDrawer" aria-label="Close Menu">
      &times;
    </button>
  </div>

  <nav class="drawer-menu">
    <a href="joki.html">Joki</a>
    <a href="index.html" aria-current="page">Top Up</a>
    <a href="https://wa.me/6281357706121" target="_blank">Hubungi CS</a>
  </nav>
</aside>


<div class="container">
  <!-- SLIDER -->
  <div class="slider">
    <div class="slides-track">
      <div class="slide">
        <img src="assets/columbina.png" alt="Promo 1">
      </div>
      <div class="slide">
        <img src="assets/inefa.png" alt="Promo 2">
      </div>
      <div class="slide">
        <img src="assets/hsr1.png" alt="Promo 3">
      </div>
      <div class="slide">
        <img src="assets/gi1.png" alt="Promo 4">
      </div>
      <div class="slide">
        <img src="assets/columbina.png" alt="Promo 1">
      </div>
    </div>
    <button class="prev-btn" id="prevBtn">&#10094;</button>
    <button class="next-btn" id="nextBtn">&#10095;</button>
    <div class="slider-dots" id="sliderDots"></div>
  </div>
  
  <!-- MENU UTAMA -->
  <div class="main-menu">
    <a href="index.html" class="main-card active">
      <span class="menu-icon">💎</span>
      <div class="menu-text">
        <strong>Top Up</strong>
      </div>
    </a>

    <a href="joki.html" class="main-card">
      <span class="menu-icon">🎮</span>
      <div class="menu-text">
        <strong>Joki</strong>
      </div>
    </a>
  </div>

  <!-- PILIH GAME (LOGO) -->
<section class="section">
    <div class="section-head">
      <h2>Pilih Game</h2>
      <span class="hint">Pilih dulu gamenya</span>
    </div>
    <div class="joki-grid" id="gameGrid">
      <button class="joki-card active" type="button" data-game="zenless_zone_zero">
        <img src="assets/Zenless_Zone_Zero.png" alt="Zenless Zone Zero">
        <div class="joki-meta">
          <span class="joki-title">Zenless Zone Zero</span>
          <span class="joki-sub">Monochromes</span>
        </div>
      </button>
      <button class="joki-card" type="button" data-game="genshin_impact">
        <img src="assets/Genshin_Impact.png" alt="Genshin Impact">
        <div class="joki-meta">
          <span class="joki-title">Genshin Impact</span>
          <span class="joki-sub">Genesis Crystals</span>
        </div>
      </button>
      <button class="joki-card" type="button" data-game="honkai_star_rail">
        <img src="assets/Honkai_Star_Rail.png" alt="Honkai Star Rail">
        <div class="joki-meta">
          <span class="joki-title">Honkai Star Rail</span>
          <span class="joki-sub">Oneiric Shard</span>
        </div>
      </button>
      <button class="joki-card" type="button" data-game="wuthering_waves">
        <img src="assets/Wuthering_Waves.png" alt="Wuthering Waves">
        <div class="joki-meta">
          <span class="joki-title">Wuthering Waves</span>
          <span class="joki-sub">Lunites</span>
        </div>
      </button>
  </section>

  <!-- FILTER CHIPS + PILIH ITEM -->
  <section class="section">
    <div class="section-head">
      <h2>Pilih Paket</h2>
      <span class="hint">Filter berdasarkan kategori</span>
    </div>

    <div class="chip-row" id="topupCategory">
      <button class="chip active" type="button">Semua</button>
      <button class="chip" type="button">Pass</button>
    </div>

    <!-- PILIH ITEM -->
    <div id="itemList" class="item-list"></div>
  </section>

  <section class="note">
    <div class="note-card">
      <h4>Catatan</h4>
      <ul>
        <li>Harga Topup Bisa Berubah Sewaktu Waktu</li>
        <li>Untuk Topup Game Lainnya Bisa Chat Admin Langsung</li>
        <li>Pastikan Data Akun Sudah Benar</li>
      </ul>
    </div>
  </section>

</div>

<footer>© WILLPEDIA 2026</footer>

<script src="js/app.js"></script>
</body>
</html>
